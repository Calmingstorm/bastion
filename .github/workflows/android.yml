name: Android

on:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            android/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: android/src-tauri -> target

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install android dependencies
        run: npm ci
        working-directory: android

      - name: Initialize Tauri Android project
        run: npx tauri android init
        working-directory: android

      - name: Patch MainActivity (disable edge-to-edge, set system bar colors)
        run: |
          cat > android/src-tauri/gen/android/app/src/main/java/org/bastions/app/MainActivity.kt <<'KOTLIN'
          package org.bastions.app

          import android.os.Bundle
          import android.graphics.Color

          class MainActivity : TauriActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              window.statusBarColor = Color.parseColor("#16121e")
              window.navigationBarColor = Color.parseColor("#16121e")
            }
          }
          KOTLIN

      - name: Build APK
        run: npx tauri android build --apk
        working-directory: android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        run: |
          # Generate a keystore for signing
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias bastion \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass bastion123 -keypass bastion123 \
            -dname "CN=Bastion, OU=Dev, O=Bastion, L=Unknown, ST=Unknown, C=US"

          # Find the unsigned release APK
          APK=$(find android/src-tauri/gen/android -name "*.apk" -path "*/release/*" | head -1)
          echo "Found APK: $APK"

          # Sign with apksigner
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner sign \
            --ks release.keystore \
            --ks-key-alias bastion \
            --ks-pass pass:bastion123 \
            --key-pass pass:bastion123 \
            "$APK"

          APK_DIR=$(dirname "$APK")
          cp "$APK" "$APK_DIR/Bastion.apk"
          echo "apk_path=$APK_DIR/Bastion.apk" >> $GITHUB_ENV

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: "Bastion Android ${{ github.ref_name }}"
          body: "Android client release build."
          files: |
            ${{ env.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

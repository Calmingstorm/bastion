name: Android

on:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            android/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: android/src-tauri -> target

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install android dependencies
        run: npm ci
        working-directory: android

      - name: Initialize Tauri Android project
        run: npx tauri android init
        working-directory: android

      - name: Dump generated Android project structure
        run: |
          echo "=== Generated files ==="
          find android/src-tauri/gen/android -name "*.kt" -o -name "*.xml" -o -name "*.gradle*" | sort
          echo "=== AndroidManifest.xml ==="
          cat android/src-tauri/gen/android/app/src/main/AndroidManifest.xml || true
          echo "=== MainActivity.kt ==="
          cat android/src-tauri/gen/android/app/src/main/java/org/bastions/app/MainActivity.kt || true
          echo "=== WryActivity.kt ==="
          cat android/src-tauri/gen/android/app/src/main/java/org/bastions/app/generated/WryActivity.kt || true
          echo "=== RustWebView.kt ==="
          cat android/src-tauri/gen/android/app/src/main/java/org/bastions/app/generated/RustWebView.kt || true
          echo "=== Vite dist contents ==="
          ls -la android/dist/ || true
          cat android/dist/index.html || true
        working-directory: .

      - name: Build debug APK
        run: npx tauri android build --apk --debug
        working-directory: android
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Find and rename debug APK
        id: find_apk
        run: |
          APK=$(find android/src-tauri/gen/android -name "*.apk" -path "*/debug/*" | head -1)
          echo "Found APK: $APK"
          APK_DIR=$(dirname "$APK")
          cp "$APK" "$APK_DIR/Bastion-debug.apk"
          echo "apk_path=$APK_DIR/Bastion-debug.apk" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: "Bastion Android ${{ github.ref_name }}"
          body: "Android client debug build."
          files: |
            ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

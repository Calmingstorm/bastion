          type: string
          format: uuid
          description: Internal pseudo-user ID for the webhook
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Bot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          description: Internal bot user ID
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        tokenHint:
          type: string
          description: Last 8 characters of the token
        token:
          type: string
          description: Full token — only included on creation
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/Author'
        content:
          type: string
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
        authorOverride:
          $ref: '#/components/schemas/AuthorOverride'
        editedAt:
          type: string
          format: date-time
          nullable: true
        replyToId:
          type: string
          format: uuid
          nullable: true
        replyTo:
          $ref: '#/components/schemas/ReplyInfo'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        reactions:
          type: array
          items:
            $ref: '#/components/schemas/Reaction'
        createdAt:
          type: string
          format: date-time

    Author:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isBot:
          type: boolean

    AuthorOverride:
      type: object
      nullable: true
      description: |
        Display override for imported messages. When present, clients should
        show this username/avatar instead of the bot's actual identity.
      properties:
        username:
          type: string
        avatarUrl:
          type: string
          format: uri

    Embed:
      type: object
      description: |
        Rich embed object. Max 10 embeds per message, max 6000 chars total
        per embed, max 25 fields per embed.
      properties:
        title:
          type: string
          description: Embed title (bold)
        description:
          type: string
          description: Embed body text (supports Markdown)
        url:
          type: string
          format: uri
          description: URL the title links to
        color:
          type: integer
          description: Color as decimal integer (e.g. 65280 for green)
        fields:
          type: array
          items:
            $ref: '#/components/schemas/EmbedField'
          maxItems: 25
        footer:
          type: object
          properties:
            text:
              type: string
        thumbnail:
          type: object
          properties:
            url:
              type: string
              format: uri
        image:
          type: object
          properties:
            url:
              type: string
              format: uri

    EmbedField:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: string
        inline:
          type: boolean
          default: false
          description: Whether to display side-by-side with other inline fields

    ReplyInfo:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        author:
          $ref: '#/components/schemas/Author'

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
          format: int64
        url:
          type: string

    Reaction:
      type: object
      properties:
        emoji:
          type: string
        count:
          type: integer
        users:
          type: array
          items:
            type: string

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        name:
          type: string
        topic:
          type: string
          nullable: true
        type:
          type: string
          enum: [text, voice]
        position:
          type: integer
        categoryId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    ChannelCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: integer
        createdAt:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          nullable: true
        position:
          type: integer
        permissions:
          type: integer
          format: int64
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Member:
      type: object
      properties:
        serverId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        nickname:
          type: string
          nullable: true
        role:
          type: string
        status:
          type: string
        isBot:
          type: boolean
        joinedAt:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              color:
                type: string
                nullable: true
              position:
                type: integer

    CommandOption:
      type: object
      properties:
        name:
          type: string
          description: Option name
        description:
          type: string
        type:
          type: integer
          description: "3=STRING, 4=INTEGER, 5=BOOLEAN, 6=USER, 7=CHANNEL"
        required:
          type: boolean
        choices:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string

    ApplicationCommand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        botId:
          type: string
          format: uuid
        type:
          type: integer
          description: "1=CHAT_INPUT, 2=USER, 3=MESSAGE"
        name:
          type: string
        description:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/CommandOption'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCommandRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: "Lowercase alphanumeric + hyphens/underscores, 1-32 chars"
          example: "ping"
        description:
          type: string
          maxLength: 100
          example: "Responds with pong"
        type:
          type: integer
          description: "1=CHAT_INPUT (default), 2=USER, 3=MESSAGE"
          default: 1
        options:
          type: array
          items:
            $ref: '#/components/schemas/CommandOption'

    UpdateCommandRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 100
        options:
          type: array
          items:
            $ref: '#/components/schemas/CommandOption'

    ExecuteInteractionRequest:
      type: object
      required: [commandId, channelId]
      properties:
        commandId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
        targetId:
          type: string
          format: uuid
          description: "User or message ID for context menu commands"

    InteractionCallbackRequest:
      type: object
      properties:
        content:
          type: string
          description: Message content
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
        ephemeral:
          type: boolean
          description: "If true, only the invoking user sees this response (not stored in DB)"
          default: false

    DeleteResponse:
      type: object
      properties:
        status:
          type: string
          example: "deleted"

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: "VALIDATION_ERROR"
            message:
              type: string
              description: Human-readable error message

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "name is required and must be 1-100 characters"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "invalid token"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "FORBIDDEN"
              message: "missing required permission"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "NOT_FOUND"
              message: "resource not found"

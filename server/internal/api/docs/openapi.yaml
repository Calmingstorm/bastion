      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 32
        description:
          type: string

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
          maxLength: 4000
          description: Message content (required if no embeds)
        replyToId:
          type: string
          format: uuid
          description: ID of message to reply to
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
          maxItems: 10
          description: Rich embed objects (required if no content)
        createdAt:
          type: string
          format: date-time
          description: |
            Backdate the message (bot-only). Cannot be in the future.
            Useful for importing historical messages.

    EditMessageRequest:
      type: object
      properties:
        content:
          type: string
          maxLength: 4000
          description: New message content (required if no embeds)
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
          maxItems: 10
          description: New embed objects (required if no content)

    ImportMessage:
      type: object
      properties:
        content:
          type: string
          maxLength: 4000
          description: Message content (required if no embeds)
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
          maxItems: 10
        createdAt:
          type: string
          format: date-time

      properties:
        id:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        token:
          type: string

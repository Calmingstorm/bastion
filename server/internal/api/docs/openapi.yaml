  # ── WebSocket ───────────────────────────────────────────────────────
  /ws:
    get:
      tags: [WebSocket]
      summary: Connect to WebSocket
      description: |
        Opens a WebSocket connection for real-time events.

        ## Connecting

        Bots authenticate via query parameter:
        ```
        wss://your-server.com/api/v1/ws?token=bot_xxxxxxxxxxxx
        ```

        JWTs can also be passed via query param or `Authorization: Bearer <jwt>` header.

        ## Connection Lifecycle

        1. **Connect** — server upgrades to WebSocket
        2. **Auto-subscribe** — server automatically subscribes the bot to all
           channels it has access to (based on server membership). No manual
           subscription needed.
        3. **Presence** — server sets the bot's status to `"online"` and
           broadcasts `PRESENCE_UPDATE` to other members
        4. **Receive events** — all events for subscribed channels stream in
        5. **Disconnect** — server broadcasts `PRESENCE_UPDATE` with `"offline"`

        There is no `CONNECTED` or `HELLO` event — the connection is ready
        immediately after the WebSocket upgrade completes.

        ## Keepalive / Heartbeat

        The server sends WebSocket **PING** frames every **30 seconds**.
        Your client library should handle PONG automatically (most do).
        If no PONG is received within **60 seconds**, the server closes
        the connection.

        You can optionally send a `HEARTBEAT` message to refresh your
        presence TTL (useful if your client framework doesn't auto-pong):
        ```json
        {"type": "HEARTBEAT", "data": {}}
        ```

        ## Message Format

        All messages (both directions) are JSON with `type` and `data`:
        ```json
        {"type": "EVENT_TYPE", "data": { ... }}
        ```

        ## Client-to-Server Messages

        Bots can send three message types:

        ### HEARTBEAT
        Refreshes presence TTL. No response.
        ```json
        {"type": "HEARTBEAT", "data": {}}
        ```

        ### TYPING_START
        Broadcasts a typing indicator to the channel.
        Debounced server-side: only fires once per 8 seconds per channel.
        ```json
        {"type": "TYPING_START", "data": {"channelId": "uuid"}}
        ```

        ### PRESENCE_UPDATE
        Sets a custom presence status, broadcast to all servers the bot is in.
        ```json
        {"type": "PRESENCE_UPDATE", "data": {"status": "online"}}
        ```
        Valid statuses: `"online"`, `"away"`, `"dnd"`, `"offline"`, or any
        custom string.

        ## Server-to-Client Events

        ### Message Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `MESSAGE_CREATE` | Full `Message` object | New message posted |
        | `MESSAGE_UPDATE` | Full `Message` object | Message edited |
        | `MESSAGE_DELETE` | `{channelId, messageId}` | Message deleted |
        | `MESSAGE_PIN` | `{channelId, messageId, pinnedBy}` | Message pinned |
        | `MESSAGE_UNPIN` | `{channelId, messageId}` | Message unpinned |

        ### Reaction Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `REACTION_ADD` | `{channelId, messageId, userId, emoji}` | Reaction added |
        | `REACTION_REMOVE` | `{channelId, messageId, userId, emoji}` | Reaction removed |

        ### Channel Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `CHANNEL_CREATE` | Full `Channel` object | Channel created |
        | `CHANNEL_UPDATE` | Full `Channel` object | Channel updated |
        | `CHANNEL_DELETE` | `{channelId, serverId}` | Channel deleted |

        ### Category Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `CATEGORY_CREATE` | Full category object | Category created |
        | `CATEGORY_UPDATE` | Full category object | Category updated |
        | `CATEGORY_DELETE` | `{categoryId, serverId}` | Category deleted |

        ### Server Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `SERVER_UPDATE` | Full `Server` object | Server settings changed |
        | `SERVER_DELETE` | `{serverId}` | Server deleted |

        ### Member Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `SERVER_MEMBER_JOIN` | `{serverId, userId}` | User joined server |
        | `SERVER_MEMBER_LEAVE` | `{serverId, userId}` | User left server |
        | `MEMBER_KICK` | `{serverId, userId}` | User kicked |
        | `MEMBER_BAN` | `{serverId, userId}` | User banned |
        | `MEMBER_TIMEOUT` | `{serverId, userId, timedOutUntil}` | User timed out (`timedOutUntil` is RFC 3339) |
        | `MEMBER_NICKNAME_UPDATE` | `{serverId, userId, nickname}` | Nickname changed |

        ### Role Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `ROLE_CREATE` | Full `Role` object | Role created |
        | `ROLE_UPDATE` | Full `Role` object | Role updated |
        | `ROLE_DELETE` | `{roleId, serverId}` | Role deleted |
        | `ROLE_ASSIGNED` | `{serverId, roleId, userId}` | Role assigned to user |
        | `ROLE_REMOVED` | `{serverId, roleId, userId}` | Role removed from user |

        ### Presence & Activity Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `PRESENCE_UPDATE` | `{userId, status}` | User came online/offline/changed status |
        | `TYPING_START` | `{channelId, userId}` | User is typing |
        | `NOTIFICATION` | `{channelId, mentionCount, senderName, channelName, content}` | Bot was @mentioned (sent only to the mentioned user) |

        ### DM Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `DM_CREATE` | Full DM channel object | New DM conversation started |

        ### Interaction Events

        | Event | Data | Description |
        |-------|------|-------------|
        | `INTERACTION_CREATE` | Full `Interaction` object | User invoked a slash command or context menu command (sent to the bot's user) |

        The `Interaction` payload includes `id`, `type`, `serverId`, `channelId`,
        `member` (invoking user), `command` (`{id, name, options}`), `token`
        (for the callback), and optionally `targetId` (for USER/MESSAGE commands).

        Respond via `POST /api/v1/interactions/{token}/callback` within 15 minutes.

        ## Connection Limits

        | Parameter | Value |
        |-----------|-------|
        | Max message size | 4096 bytes |
        | Send buffer | 256 events |
        | Ping interval | 30 seconds |
        | Pong timeout | 60 seconds |

        If the server cannot deliver events fast enough (buffer full), it will
        close the connection with code `4003`. Reconnect and resume.

        ## Example: Minimal Bot

        ```python
        import websocket, json

        def on_message(ws, message):
            event = json.loads(message)
            if event["type"] == "MESSAGE_CREATE":
                msg = event["data"]
                print(f"#{msg['channelId']}: {msg['author']['username']}: {msg['content']}")

        ws = websocket.WebSocketApp(
            "wss://your-server.com/api/v1/ws?token=bot_xxxxxxxxxxxx",
            on_message=on_message
        )
        ws.run_forever(ping_interval=30)
        ```
      operationId: connectWebSocket
      security:
        - BotToken: []
        - BearerAuth: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Bot token (bot_xxx) or JWT access token
      responses:
        '101':
          description: WebSocket upgrade

components:
  securitySchemes:
    BotToken:
      type: apiKey
      in: header
      name: Authorization
      description: 'Bot token: `Bot bot_xxxxxxxxxxxx`'
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from login

  parameters:
    serverID:
      name: serverID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Server ID
    webhookID:
      name: webhookID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Webhook ID
    botID:
      name: botID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Bot ID
    channelID:
      name: channelID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Channel ID
    messageID:
      name: messageID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Message ID
    userID:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User ID
    roleID:
      name: roleID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Role ID
    categoryID:
      name: categoryID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Category ID
    emoji:
      name: emoji
      in: path
      required: true
      schema:
        type: string
      description: Emoji character (URL-encoded)

  schemas:
    # ── Request Bodies ──────────────────────────────────────────────
    WebhookExecuteRequest:
      type: object
      properties:
        content:
          type: string
          maxLength: 4000
          description: Message content (required if no embeds)
        username:
          type: string
          description: Override the webhook's display name for this message (persisted as authorOverride)
        avatarUrl:
          type: string
          format: uri
          description: Override the webhook's avatar for this message (persisted as authorOverride)
        embeds:
          type: array
          items:
            $ref: '#/components/schemas/Embed'
          maxItems: 10
          description: Rich embed objects (required if no content)

    CreateWebhookRequest:
      type: object
      required: [name, channelId]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Webhook display name
        channelId:
          type: string
          format: uuid
          description: Target channel ID

    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        channelId:
          type: string
          format: uuid

    CreateBotRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 32

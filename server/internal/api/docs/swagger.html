<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bastion API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    /* Dark theme matching Bastion's design tokens */
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #6c63ff;
      --accent-hover: #5a52d5;
      --border: #2a2a4a;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Header bar */
    .topbar { display: none !important; }

    .swagger-ui {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Custom header */
    .bastion-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bastion-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .bastion-header .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Swagger UI dark overrides */
    .swagger-ui .scheme-container,
    .swagger-ui .wrapper { background: var(--bg-primary); }

    .swagger-ui .opblock-tag { color: var(--text-primary) !important; border-bottom-color: var(--border) !important; }
    .swagger-ui .opblock-tag:hover { background: var(--bg-secondary) !important; }

    .swagger-ui .info .title,
    .swagger-ui .info h1, .swagger-ui .info h2, .swagger-ui .info h3 { color: var(--text-primary); }
    .swagger-ui .info p, .swagger-ui .info li,
    .swagger-ui .info table td, .swagger-ui .info table th { color: var(--text-secondary); }
    .swagger-ui .info a { color: var(--accent); }
    .swagger-ui .info table { border-collapse: collapse; }
    .swagger-ui .info table th,
    .swagger-ui .info table td { border: 1px solid var(--border); padding: 6px 12px; }
    .swagger-ui .info table th { background: var(--bg-secondary); }

    .swagger-ui .info .markdown code,
    .swagger-ui .info .markdown pre {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-radius: 4px;
    }
    .swagger-ui .info .markdown pre { padding: 12px; }

    .swagger-ui .opblock { border-color: var(--border) !important; background: var(--bg-secondary) !important; }
    .swagger-ui .opblock .opblock-summary { border-color: var(--border) !important; }
    .swagger-ui .opblock .opblock-summary-description { color: var(--text-secondary) !important; }
    .swagger-ui .opblock .opblock-summary-path { color: var(--text-primary) !important; }
    .swagger-ui .opblock .opblock-section-header { background: var(--bg-tertiary) !important; }
    .swagger-ui .opblock .opblock-section-header h4 { color: var(--text-primary) !important; }

    .swagger-ui .opblock-body pre,
    .swagger-ui .opblock-body .highlight-code { background: var(--bg-primary) !important; color: var(--text-primary) !important; }

    .swagger-ui .model-box,
    .swagger-ui .model { color: var(--text-primary) !important; }
    .swagger-ui .model-title { color: var(--text-primary) !important; }

    .swagger-ui .parameter__name { color: var(--text-primary) !important; }
    .swagger-ui .parameter__type { color: var(--text-secondary) !important; }
    .swagger-ui table.parameters td, .swagger-ui table.parameters th { color: var(--text-primary); }

    .swagger-ui .response-col_status { color: var(--text-primary) !important; }
    .swagger-ui .response-col_description,
    .swagger-ui .response-col_description p { color: var(--text-secondary) !important; }
    .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5 { color: var(--text-primary) !important; }

    .swagger-ui select,
    .swagger-ui input[type=text],
    .swagger-ui textarea {
      background: var(--bg-primary) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .btn {
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
    }
    .swagger-ui .btn.execute { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
    .swagger-ui .btn.execute:hover { background: var(--accent-hover) !important; }

    .swagger-ui .models { border-color: var(--border) !important; }
    .swagger-ui .models h4 span { color: var(--text-primary) !important; }
    .swagger-ui .model-container { background: var(--bg-secondary) !important; }

    .swagger-ui .loading-container .loading::after { color: var(--text-secondary); }

    .swagger-ui .scheme-container { background: var(--bg-secondary) !important; box-shadow: none !important; border-bottom: 1px solid var(--border); }

    .swagger-ui section.models { background: var(--bg-secondary); border-radius: 4px; }
    .swagger-ui section.models.is-open h4 { border-bottom-color: var(--border) !important; }

    .swagger-ui .markdown p, .swagger-ui .markdown li { color: var(--text-secondary); }
    .swagger-ui .markdown code { background: var(--bg-tertiary); color: var(--text-primary); padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="bastion-header">
    <h1>Bastion API Documentation</h1>
    <span class="badge">v1</span>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: '/api/v1/docs/openapi.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis],
      layout: 'BaseLayout',
      defaultModelsExpandDepth: 0,
      docExpansion: 'list',
      tryItOutEnabled: true,
    });
  </script>
</body>
</html>
